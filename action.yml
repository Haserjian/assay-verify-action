name: 'Assay Verify Pack'
description: 'Verify AI evidence bundles (Proof Packs) for integrity and behavioral claims'
author: 'Haserjian'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  pack-path:
    description: 'Path to Proof Pack directory (glob supported)'
    required: false
    default: 'proof_pack_*/'
  require-claim-pass:
    description: 'Fail the step if any claim check is not PASS'
    required: false
    default: 'true'
  lock-file:
    description: 'Path to assay.lock for pinned verification semantics'
    required: false
    default: ''
  comment-on-pr:
    description: 'Post a summary comment on the pull request'
    required: false
    default: 'true'
  upload-artifact:
    description: 'Upload pack as a workflow artifact'
    required: false
    default: 'true'
  require-pack:
    description: 'Fail if PR has file changes but no Proof Pack (set false for docs-only repos)'
    required: false
    default: 'true'
  trust-target:
    description: 'Trust evaluation target (local_verify, ci_gate, publication). Advisory only — does not affect exit codes.'
    required: false
    default: ''
  trust-policy-dir:
    description: 'Directory containing signers.yaml and acceptance.yaml for trust evaluation'
    required: false
    default: ''
  enforce-trust:
    description: 'When true and trust-target is set, fail the step if acceptance is reject (requires clean policy load). Advisory by default.'
    required: false
    default: 'false'
  assay-version:
    description: 'assay-ai version to install (default: latest)'
    required: false
    default: ''
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  verification-mode:
    description: 'Verification mode: proof_pack (default) or rce_replay'
    required: false
    default: 'proof_pack'
  replay-output-dir:
    description: 'Subdirectory for replay results written inside each matched replay root'
    required: false
    default: 'replay_results'

outputs:
  integrity:
    description: 'PASS or FAIL'
    value: ${{ steps.verify.outputs.integrity }}
  claims:
    description: 'PASS, FAIL, or N/A'
    value: ${{ steps.verify.outputs.claims }}
  exit-code:
    description: '0 (all pass), 1 (claim fail), 2 (integrity fail)'
    value: ${{ steps.verify.outputs.exit_code }}
  pack-count:
    description: 'Number of packs verified'
    value: ${{ steps.verify.outputs.pack_count }}
  replay-state:
    description: 'Machine-readable replay execution state'
    value: ${{ steps.verify.outputs.replay_state }}
  replay-verdict:
    description: 'Aggregate replay verdict: MATCH, DIVERGE, INTEGRITY_FAIL, or N/A'
    value: ${{ steps.verify.outputs.replay_verdict }}
  replay-roots-matched:
    description: 'Number of replay roots matched during discovery'
    value: ${{ steps.verify.outputs.replay_roots_matched }}
  replay-results-json:
    description: 'Machine-readable per-root replay results as compact JSON'
    value: ${{ steps.verify.outputs.replay_results_json }}
  summary:
    description: 'Markdown summary of verification results'
    value: ${{ steps.verify.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Assay
      shell: bash
      env:
        ASSAY_VERSION: ${{ inputs.assay-version }}
      run: |
        if [ -n "$ASSAY_VERSION" ]; then
          pip install "assay-ai==$ASSAY_VERSION" --quiet
        else
          pip install assay-ai --quiet
        fi

    - name: Verify Proof Packs
      id: verify
      shell: bash
      env:
        INPUT_PACK_PATH: ${{ inputs.pack-path }}
        INPUT_REQUIRE_CLAIM_PASS: ${{ inputs.require-claim-pass }}
        INPUT_LOCK_FILE: ${{ inputs.lock-file }}
        INPUT_REQUIRE_PACK: ${{ inputs.require-pack }}
        INPUT_TRUST_TARGET: ${{ inputs.trust-target }}
        INPUT_TRUST_POLICY_DIR: ${{ inputs.trust-policy-dir }}
        INPUT_ENFORCE_TRUST: ${{ inputs.enforce-trust }}
        INPUT_VERIFICATION_MODE: ${{ inputs.verification-mode }}
        INPUT_REPLAY_OUTPUT_DIR: ${{ inputs.replay-output-dir }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set +e

        _write_multiline_output() {
          local _NAME="$1"
          local _VALUE="$2"
          local _EOF_MARKER="ASSAY_OUTPUT_EOF_${_NAME}_$$_${RANDOM}"
          echo "${_NAME}<<${_EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo "$_VALUE" >> "$GITHUB_OUTPUT"
          echo "${_EOF_MARKER}" >> "$GITHUB_OUTPUT"
        }

        _write_replay_outputs() {
          local _STATE="$1"
          local _VERDICT="$2"
          local _ROOTS="$3"
          local _RESULTS_JSON="${4:-[]}"
          echo "replay_state=${_STATE}" >> "$GITHUB_OUTPUT"
          echo "replay_verdict=${_VERDICT}" >> "$GITHUB_OUTPUT"
          echo "replay_roots_matched=${_ROOTS}" >> "$GITHUB_OUTPUT"
          _write_multiline_output "replay_results_json" "$_RESULTS_JSON"
        }

        _append_replay_result() {
          local _CURRENT_JSON="$1"
          local _PACK_NAME="$2"
          local _VERDICT="$3"
          local _INTEGRITY="$4"
          local _CLAIMS="$5"
          local _STEPS_REPLAYED="$6"
          python3 - "$_CURRENT_JSON" "$_PACK_NAME" "$_VERDICT" "$_INTEGRITY" "$_CLAIMS" "$_STEPS_REPLAYED" <<'PY'
            import json
            import sys

            results = json.loads(sys.argv[1])
            results.append(
              {
                "pack": sys.argv[2],
                "verdict": sys.argv[3],
                "integrity": sys.argv[4],
                "claims": sys.argv[5],
                "steps_replayed": sys.argv[6],
                "replay_basis": "recorded_trace",
              }
            )
            print(json.dumps(results, separators=(",", ":")))
            PY
            if [ $? -ne 0 ]; then
              echo "$_CURRENT_JSON"
            fi
        }

        # ── RCE REPLAY MODE ─────────────────────────────────────────────────────
        if [ "$INPUT_VERIFICATION_MODE" = "rce_replay" ]; then

          # 1. Reject unsupported inputs
          GUARD_ERRORS=0
          if [ "$INPUT_REQUIRE_CLAIM_PASS" = "false" ]; then
            echo "::error::Configuration error: require-claim-pass: false is not allowed in rce_replay mode. assay rce-verify encodes DIVERGE as exit 1 — disabling this creates a silent-pass path for honest divergence."
            GUARD_ERRORS=1
          fi
          if [ -n "$INPUT_LOCK_FILE" ]; then
            echo "::error::Configuration error: lock-file is not supported in rce_replay mode v1."
            GUARD_ERRORS=1
          fi
          if [ -n "$INPUT_TRUST_TARGET" ]; then
            echo "::error::Configuration error: trust-target is not supported in rce_replay mode v1."
            GUARD_ERRORS=1
          fi
          if [ -n "$INPUT_TRUST_POLICY_DIR" ]; then
            echo "::error::Configuration error: trust-policy-dir is not supported in rce_replay mode v1."
            GUARD_ERRORS=1
          fi
          if [ "$INPUT_ENFORCE_TRUST" = "true" ]; then
            echo "::error::Configuration error: enforce-trust is not supported in rce_replay mode v1."
            GUARD_ERRORS=1
          fi
          if [ $GUARD_ERRORS -ne 0 ]; then
            _GUARD_SUMMARY="### Assay Verification\n\n**Mode: RCE replay (\`recorded_trace\`, Tier A)**\n\n**Result: INTEGRITY FAIL** -- configuration rejected for rce_replay mode\n"
            echo "integrity=FAIL" >> "$GITHUB_OUTPUT"
            echo "claims=N/A" >> "$GITHUB_OUTPUT"
            echo "exit_code=2" >> "$GITHUB_OUTPUT"
            echo "pack_count=0" >> "$GITHUB_OUTPUT"
            _write_replay_outputs "configuration_rejected" "INTEGRITY_FAIL" "0" "[]"
            echo -e "$_GUARD_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
            EOF_MARKER="ASSAY_SUMMARY_EOF_$(date +%s)"
            echo "summary<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo -e "$_GUARD_SUMMARY" >> "$GITHUB_OUTPUT"
            echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            exit 2
          fi

          # 2. Pack discovery -- same glob, filter to directories
          shopt -s nullglob
          ALL_MATCHES=($INPUT_PACK_PATH)
          shopt -u nullglob
          REPLAY_ROOTS=()
          for M in "${ALL_MATCHES[@]}"; do
            [ -d "$M" ] && REPLAY_ROOTS+=("$M")
          done

          _replay_write_skip_outputs() {
            local _SKIP_SUMMARY="### Assay Verification\n\n**Mode: RCE replay (\`recorded_trace\`, Tier A)**\n\n**Result: SKIPPED** -- no replay roots found (\`require-pack: false\`)\n"
            echo "integrity=N/A" >> "$GITHUB_OUTPUT"
            echo "claims=N/A" >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "pack_count=0" >> "$GITHUB_OUTPUT"
            _write_replay_outputs "skipped_no_roots" "N/A" "0" "[]"
            echo -e "$_SKIP_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
            EOF_MARKER="ASSAY_SUMMARY_EOF_$(date +%s)"
            echo "summary<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo -e "$_SKIP_SUMMARY" >> "$GITHUB_OUTPUT"
            echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          }

          _replay_write_zero_pack_fail() {
            local _MSG="$1"
            local _FAIL_SUMMARY="### Assay Verification\n\n**Mode: RCE replay (\`recorded_trace\`, Tier A)**\n\n**Result: INTEGRITY FAIL** -- $_MSG\n"
            echo "::error::$_MSG"
            echo "integrity=FAIL" >> "$GITHUB_OUTPUT"
            echo "claims=N/A" >> "$GITHUB_OUTPUT"
            echo "exit_code=2" >> "$GITHUB_OUTPUT"
            echo "pack_count=0" >> "$GITHUB_OUTPUT"
            _write_replay_outputs "zero_roots_required" "INTEGRITY_FAIL" "0" "[]"
            echo -e "$_FAIL_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
            EOF_MARKER="ASSAY_SUMMARY_EOF_$(date +%s)"
            echo "summary<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo -e "$_FAIL_SUMMARY" >> "$GITHUB_OUTPUT"
            echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          }

          if [ ${#REPLAY_ROOTS[@]} -eq 0 ]; then
            if [ "$INPUT_REQUIRE_PACK" != "true" ]; then
              echo "::notice::No replay roots found (require-pack: false) -- skipping."
              _replay_write_skip_outputs
              exit 0
            fi
            _replay_write_zero_pack_fail "No replay roots matched: $INPUT_PACK_PATH"
            exit 2
          fi

          # 3. Probe for assay rce-verify
          if ! assay rce-verify --help >/dev/null 2>&1; then
            echo "::error::assay rce-verify is not available in the installed assay-ai version. Replay mode requires an assay-ai release that includes rce-verify. Fail closed."
            echo "integrity=FAIL" >> "$GITHUB_OUTPUT"
            echo "claims=N/A" >> "$GITHUB_OUTPUT"
            echo "exit_code=2" >> "$GITHUB_OUTPUT"
            echo "pack_count=0" >> "$GITHUB_OUTPUT"
            _write_replay_outputs "verifier_unavailable" "INTEGRITY_FAIL" "${#REPLAY_ROOTS[@]}" "[]"
            _PROBE_SUMMARY="### Assay Verification\n\n**Mode: RCE replay (\`recorded_trace\`, Tier A)**\n\n**Result: INTEGRITY FAIL** -- assay rce-verify is not available\n"
            echo -e "$_PROBE_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
            EOF_MARKER="ASSAY_SUMMARY_EOF_$(date +%s)"
            echo "summary<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo -e "$_PROBE_SUMMARY" >> "$GITHUB_OUTPUT"
            echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            exit 2
          fi

          # 4. Per-root loop
          PACK_COUNT=0
          WORST_EXIT=0
          REPLAY_SUMMARY=""
          REPLAY_RESULTS_JSON="[]"
          for PACK_DIR in "${REPLAY_ROOTS[@]}"; do
            PACK_COUNT=$((PACK_COUNT + 1))
            PACK_NAME=$(basename "$PACK_DIR")

            # Layout check — missing layout is INTEGRITY_FAIL for this root
            LAYOUT_OK=1
            for REQUIRED in pack_manifest.json receipt_pack.jsonl episode_contract.json inputs recorded_traces; do
              if [ ! -e "$PACK_DIR/$REQUIRED" ]; then
                echo "::error::Replay layout check failed for $PACK_NAME: missing $REQUIRED"
                LAYOUT_OK=0
              fi
            done

            if [ $LAYOUT_OK -eq 0 ]; then
              WORST_EXIT=2
              REPLAY_RESULTS_JSON=$(_append_replay_result "$REPLAY_RESULTS_JSON" "$PACK_NAME" "INTEGRITY_FAIL" "FAIL" "N/A" "?")
              REPLAY_SUMMARY="${REPLAY_SUMMARY}| \`${PACK_NAME}\` | INTEGRITY_FAIL | FAIL | N/A | — | recorded_trace |\n"
              continue
            fi

            # Run verifier
            OUT_DIR="$PACK_DIR/$INPUT_REPLAY_OUTPUT_DIR"
            RAW_JSON=$(assay rce-verify "$PACK_DIR" --out-dir "$OUT_DIR" --overwrite --json 2>&1)
            RCE_EXIT=$?

            # Parse verdict -- parse failure or CLI exit 3 → INTEGRITY_FAIL
            VERDICT=$(echo "$RAW_JSON" | python3 -c "import json,sys;d=json.load(sys.stdin);print(d['verdict'] if d.get('status')=='ok' else 'PARSE_ERROR')" 2>/dev/null || echo "PARSE_ERROR")

            if [ "$VERDICT" = "PARSE_ERROR" ] || [ -z "$VERDICT" ] || [ "$RCE_EXIT" -eq 3 ]; then
              echo "::error::Failed to parse assay rce-verify JSON output for $PACK_NAME (CLI exit $RCE_EXIT). Treating as INTEGRITY_FAIL."
              WORST_EXIT=2
              REPLAY_RESULTS_JSON=$(_append_replay_result "$REPLAY_RESULTS_JSON" "$PACK_NAME" "INTEGRITY_FAIL" "FAIL" "N/A" "?")
              REPLAY_SUMMARY="${REPLAY_SUMMARY}| \`${PACK_NAME}\` | INTEGRITY_FAIL | FAIL | N/A | — | recorded_trace |\n"
              echo "::group::[INTEGRITY_FAIL] $PACK_NAME"
              echo "$RAW_JSON"
              echo "::endgroup::"
              continue
            fi

            # Map verdict to action semantics
            case "$VERDICT" in
              MATCH)
                PACK_INTEGRITY="PASS"; PACK_CLAIMS="PASS"; PACK_EXIT=0 ;;
              DIVERGE)
                PACK_INTEGRITY="PASS"; PACK_CLAIMS="FAIL"; PACK_EXIT=1 ;;
              INTEGRITY_FAIL)
                PACK_INTEGRITY="FAIL"; PACK_CLAIMS="N/A"; PACK_EXIT=2 ;;
              *)
                echo "::error::Unknown RCE verdict '$VERDICT' for $PACK_NAME. Treating as INTEGRITY_FAIL."
                PACK_INTEGRITY="FAIL"; PACK_CLAIMS="N/A"; PACK_EXIT=2
                ;;
            esac

            if [ "$PACK_EXIT" -gt "$WORST_EXIT" ]; then WORST_EXIT=$PACK_EXIT; fi

            # Read steps_replayed from sidecar (not in CLI --json output)
            RESULT_SIDECAR="$OUT_DIR/rce_replay_result.json"
            STEPS_REPLAYED="?"
            if [ -f "$RESULT_SIDECAR" ]; then
              STEPS_REPLAYED=$(python3 -c "import json;d=json.load(open('$RESULT_SIDECAR'));print(d.get('steps_replayed','?'))" 2>/dev/null || echo "?")
            fi

            REPLAY_RESULTS_JSON=$(_append_replay_result "$REPLAY_RESULTS_JSON" "$PACK_NAME" "$VERDICT" "$PACK_INTEGRITY" "$PACK_CLAIMS" "$STEPS_REPLAYED")
            REPLAY_SUMMARY="${REPLAY_SUMMARY}| \`${PACK_NAME}\` | ${VERDICT} | ${PACK_INTEGRITY} | ${PACK_CLAIMS} | ${STEPS_REPLAYED} | recorded_trace |\n"

            echo "::group::[$VERDICT] $PACK_NAME"
            echo "$RAW_JSON"
            echo "::endgroup::"
          done

          case "$WORST_EXIT" in
            0)
              INTEGRITY_ALL="PASS"
              CLAIMS_ALL="PASS"
              REPLAY_OVERALL_VERDICT="MATCH"
              ;;
            1)
              INTEGRITY_ALL="PASS"
              CLAIMS_ALL="FAIL"
              REPLAY_OVERALL_VERDICT="DIVERGE"
              ;;
            *)
              INTEGRITY_ALL="FAIL"
              CLAIMS_ALL="N/A"
              REPLAY_OVERALL_VERDICT="INTEGRITY_FAIL"
              ;;
          esac

          # 5. Write outputs and summary
          echo "integrity=$INTEGRITY_ALL" >> "$GITHUB_OUTPUT"
          echo "claims=$CLAIMS_ALL" >> "$GITHUB_OUTPUT"
          echo "exit_code=$WORST_EXIT" >> "$GITHUB_OUTPUT"
          echo "pack_count=$PACK_COUNT" >> "$GITHUB_OUTPUT"
          _write_replay_outputs "completed" "$REPLAY_OVERALL_VERDICT" "$PACK_COUNT" "$REPLAY_RESULTS_JSON"

          FULL_SUMMARY="### Assay Verification\n\n**Mode: RCE replay (\`recorded_trace\`, Tier A)**\n\n"
          if [ "$WORST_EXIT" -eq 0 ]; then
            FULL_SUMMARY="${FULL_SUMMARY}**Result: PASS** (all traces match)\n\n"
          elif [ "$WORST_EXIT" -eq 1 ]; then
            FULL_SUMMARY="${FULL_SUMMARY}**Result: DIVERGE** (integrity intact, trace comparison failed)\n\n"
          else
            FULL_SUMMARY="${FULL_SUMMARY}**Result: INTEGRITY FAIL** (evidence tampered or layout invalid)\n\n"
          fi
          FULL_SUMMARY="${FULL_SUMMARY}| Pack | Verdict | Integrity | Claims | Steps Replayed | Replay Basis |\n"
          FULL_SUMMARY="${FULL_SUMMARY}|------|---------|-----------|--------|----------------|---------------|\n"
          FULL_SUMMARY="${FULL_SUMMARY}${REPLAY_SUMMARY}\n"
          FULL_SUMMARY="${FULL_SUMMARY}> Exit code: \`${WORST_EXIT}\` (\`0\`=MATCH, \`1\`=DIVERGE, \`2\`=INTEGRITY_FAIL)\n"
          FULL_SUMMARY="${FULL_SUMMARY}>\n"
          FULL_SUMMARY="${FULL_SUMMARY}> Verified by [assay-ai](https://pypi.org/project/assay-ai/) $(assay version 2>/dev/null | head -1 || echo '')\n"

          echo -e "$FULL_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          EOF_MARKER="ASSAY_SUMMARY_EOF_$(date +%s)"
          echo "summary<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo -e "$FULL_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

          exit $WORST_EXIT
        fi
        # ── END RCE REPLAY MODE ──────────────────────────────────────────────────

        PACK_COUNT=0
        WORST_EXIT=0
        SUMMARY=""
        INTEGRITY_ALL="PASS"
        CLAIMS_ALL="PASS"
        HAS_SHADOW_MODE=0

        shopt -s nullglob
        PACK_GLOB="$INPUT_PACK_PATH"
        PACKS=($PACK_GLOB)
        shopt -u nullglob

        if [ ${#PACKS[@]} -eq 0 ]; then
          if [ "$INPUT_REQUIRE_PACK" != "true" ]; then
            echo "::notice::No Proof Packs found (require-pack: false) -- skipping."
            SKIP_SUMMARY="### Assay Verification\n\n**Result: SKIPPED** -- no Proof Packs found (\`require-pack: false\`)\n"
            echo "integrity=N/A" >> "$GITHUB_OUTPUT"
            echo "claims=N/A" >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "pack_count=0" >> "$GITHUB_OUTPUT"
            _write_replay_outputs "not_requested" "N/A" "0" "[]"
            EOF_MARKER="ASSAY_SUMMARY_EOF_$(date +%s)"
            echo "summary<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo -e "$SKIP_SUMMARY" >> "$GITHUB_OUTPUT"
            echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo -e "$SKIP_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # require-pack is true -- check whether the PR has file changes
          HAS_CHANGES="unknown"
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            # PR context: diff against base branch
            CHANGED_FILES=$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" 2>/dev/null || true)
            if [ -n "$CHANGED_FILES" ]; then
              HAS_CHANGES="yes"
            else
              HAS_CHANGES="no"
            fi
          fi

          if [ "$HAS_CHANGES" = "yes" ]; then
            MSG="PR contains file changes but no Proof Pack covers this commit. Either generate a pack or set \`require-pack: false\`."
          else
            MSG="No Proof Pack directories matched: $INPUT_PACK_PATH"
          fi

          ZERO_SUMMARY="### Assay Verification\n\n**Result: INTEGRITY FAIL** -- $MSG\n"
          echo "::error::$MSG"
          echo "integrity=FAIL" >> "$GITHUB_OUTPUT"
          echo "claims=N/A" >> "$GITHUB_OUTPUT"
          echo "exit_code=2" >> "$GITHUB_OUTPUT"
          echo "pack_count=0" >> "$GITHUB_OUTPUT"
          _write_replay_outputs "not_requested" "N/A" "0" "[]"
          EOF_MARKER="ASSAY_SUMMARY_EOF_$(date +%s)"
          echo "summary<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo -e "$ZERO_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo -e "$ZERO_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          exit 2
        fi

        TRUST_RECORDS_FILE=$(mktemp)
        echo "[]" > "$TRUST_RECORDS_FILE"

        for PACK_DIR in "${PACKS[@]}"; do
          if [ ! -d "$PACK_DIR" ]; then
            continue
          fi

          PACK_COUNT=$((PACK_COUNT + 1))
          PACK_NAME=$(basename "$PACK_DIR")

          # Build verify command
          VERIFY_CMD="assay verify-pack $PACK_DIR"
          if [ "$INPUT_REQUIRE_CLAIM_PASS" = "true" ]; then
            VERIFY_CMD="$VERIFY_CMD --require-claim-pass"
          fi
          if [ -n "$INPUT_LOCK_FILE" ]; then
            VERIFY_CMD="$VERIFY_CMD --lock $INPUT_LOCK_FILE"
          fi

          # Run verification and capture output
          OUTPUT=$($VERIFY_CMD 2>&1)
          EXIT_CODE=$?

          # Run trust evaluation if requested (--json mode, advisory only)
          if [ -n "$INPUT_TRUST_TARGET" ]; then
            TRUST_CMD="assay verify-pack $PACK_DIR --json --trust-target $INPUT_TRUST_TARGET"
            if [ -n "$INPUT_TRUST_POLICY_DIR" ]; then
              TRUST_CMD="$TRUST_CMD --trust-policy-dir $INPUT_TRUST_POLICY_DIR"
            fi
            _PACK_TRUST_JSON=$($TRUST_CMD 2>/dev/null || true)
            if [ -n "$_PACK_TRUST_JSON" ] && command -v python3 >/dev/null 2>&1; then
              python3 "${ACTION_PATH}/scripts/accumulate-trust.py" "$TRUST_RECORDS_FILE" "$_PACK_TRUST_JSON" "$PACK_NAME" 2>/dev/null || true
            fi
          fi

          if [ $EXIT_CODE -gt $WORST_EXIT ]; then
            WORST_EXIT=$EXIT_CODE
          fi

          # Parse verify_report.json for structured data
          # Fields from VerifyResult.to_dict(): passed (bool), receipt_count (int),
          # errors, warnings, head_hash. Claims are in claim_verification.passed.
          REPORT="$PACK_DIR/verify_report.json"
          if [ -f "$REPORT" ]; then
            INTEGRITY=$(python3 -c "import json; d=json.load(open('$REPORT')); print('PASS' if d.get('passed', False) else 'FAIL')" 2>/dev/null || echo "UNKNOWN")
            CLAIM_CHECK=$(python3 -c "import json; d=json.load(open('$REPORT')); cv=d.get('claim_verification'); print('N/A' if cv is None else ('PASS' if cv.get('passed', False) else 'FAIL'))" 2>/dev/null || echo "N/A")
            RECEIPT_COUNT=$(python3 -c "import json; d=json.load(open('$REPORT')); print(d.get('receipt_count', '?'))" 2>/dev/null || echo "?")
          else
            INTEGRITY="UNKNOWN"
            CLAIM_CHECK="N/A"
            RECEIPT_COUNT="?"
          fi

          # Parse pack_manifest.json for attestation
          MANIFEST="$PACK_DIR/pack_manifest.json"
          if [ -f "$MANIFEST" ]; then
            PACK_ID=$(python3 -c "import json; d=json.load(open('$MANIFEST')); print(d.get('attestation',{}).get('pack_id','?'))" 2>/dev/null || echo "?")
            MODE=$(python3 -c "import json; d=json.load(open('$MANIFEST')); print(d.get('attestation',{}).get('mode','?'))" 2>/dev/null || echo "?")
          else
            PACK_ID="?"
            MODE="?"
          fi
          MODE_LC=$(echo "$MODE" | tr '[:upper:]' '[:lower:]')
          MODE_LABEL="$MODE"
          if [ "$MODE_LC" = "shadow" ]; then
            HAS_SHADOW_MODE=1
            MODE_LABEL="shadow (not enforced)"
          fi

          if [ "$INTEGRITY" != "PASS" ]; then
            INTEGRITY_ALL="FAIL"
          fi
          if [ "$CLAIM_CHECK" = "FAIL" ]; then
            CLAIMS_ALL="FAIL"
          fi

          # Build per-pack summary row
          if [ "$INTEGRITY" = "PASS" ] && [ "$CLAIM_CHECK" = "PASS" ]; then
            if [ "$MODE_LC" = "shadow" ]; then
              STATUS_ICON="[SHADOW MODE]"
            else
              STATUS_ICON="[PASS]"
            fi
          elif [ "$INTEGRITY" = "PASS" ] && [ "$CLAIM_CHECK" = "FAIL" ]; then
            STATUS_ICON="[CLAIM FAIL]"
          else
            STATUS_ICON="[INTEGRITY FAIL]"
          fi

          SUMMARY="${SUMMARY}| \`${PACK_NAME}\` | ${INTEGRITY} | ${CLAIM_CHECK} | ${RECEIPT_COUNT} | ${MODE_LABEL} |\n"

          echo "::group::$STATUS_ICON $PACK_NAME"
          echo "$OUTPUT"
          echo "::endgroup::"
        done

        echo "integrity=$INTEGRITY_ALL" >> "$GITHUB_OUTPUT"
        echo "claims=$CLAIMS_ALL" >> "$GITHUB_OUTPUT"
        echo "exit_code=$WORST_EXIT" >> "$GITHUB_OUTPUT"
        echo "pack_count=$PACK_COUNT" >> "$GITHUB_OUTPUT"
        _write_replay_outputs "not_requested" "N/A" "0" "[]"

        # Build full summary markdown
        FULL_SUMMARY="### Assay Verification\n\n"
        if [ $HAS_SHADOW_MODE -eq 1 ]; then
          FULL_SUMMARY="${FULL_SUMMARY}> [!WARNING]\n"
          FULL_SUMMARY="${FULL_SUMMARY}> SHADOW MODE -- not enforced. At least one pack was produced in shadow mode.\n"
          FULL_SUMMARY="${FULL_SUMMARY}> This run logged checks but did not enforce policy gates for shadow-mode packs.\n\n"
        fi
        if [ $WORST_EXIT -eq 0 ]; then
          if [ $HAS_SHADOW_MODE -eq 1 ]; then
            FULL_SUMMARY="${FULL_SUMMARY}**Result: SHADOW MODE -- not enforced**\n\n"
          else
            FULL_SUMMARY="${FULL_SUMMARY}**Result: PASS**\n\n"
          fi
        elif [ $WORST_EXIT -eq 1 ]; then
          FULL_SUMMARY="${FULL_SUMMARY}**Result: CLAIM FAIL** (integrity passed, behavioral claims did not)\n\n"
        else
          FULL_SUMMARY="${FULL_SUMMARY}**Result: INTEGRITY FAIL** (evidence may be tampered or corrupted)\n\n"
        fi

        FULL_SUMMARY="${FULL_SUMMARY}| Pack | Integrity | Claims | Receipts | Mode |\n"
        FULL_SUMMARY="${FULL_SUMMARY}|------|-----------|--------|----------|------|\n"
        FULL_SUMMARY="${FULL_SUMMARY}${SUMMARY}\n"
        FULL_SUMMARY="${FULL_SUMMARY}> Exit code: \`${WORST_EXIT}\` (\`0\` = all pass, \`1\` = claim fail, \`2\` = integrity fail)\n"
        FULL_SUMMARY="${FULL_SUMMARY}>\n"
        FULL_SUMMARY="${FULL_SUMMARY}> Verified by [assay-ai](https://pypi.org/project/assay-ai/) $(assay version 2>/dev/null | head -1 || echo '')\n"

        # --- Trust evaluation summary (one section per pack, advisory only) ---
        if [ -n "$INPUT_TRUST_TARGET" ] && [ -s "$TRUST_RECORDS_FILE" ] && command -v python3 >/dev/null 2>&1; then
          TRUST_RENDER_ERR=$(mktemp)
          TRUST_SECTION=$(cat "$TRUST_RECORDS_FILE" | python3 "${ACTION_PATH}/scripts/render-trust-summary.py" 2>"$TRUST_RENDER_ERR" || true)
          if [ -n "$TRUST_SECTION" ]; then
            FULL_SUMMARY="${FULL_SUMMARY}${TRUST_SECTION}\n"
          elif [ -s "$TRUST_RENDER_ERR" ]; then
            _WARN_MSG=$(tr '\n' ' ' < "$TRUST_RENDER_ERR" | sed 's/[[:space:]]\+/ /g' | cut -c1-500)
            echo "::warning::Trust summary rendering failed: ${_WARN_MSG}"
          fi
          rm -f "$TRUST_RENDER_ERR"
        fi
        # --- Trust enforcement gate (opt-in, only on clean reject) ---
        if [ "$INPUT_ENFORCE_TRUST" = "true" ] && [ -n "$INPUT_TRUST_TARGET" ] && [ -s "$TRUST_RECORDS_FILE" ] && command -v python3 >/dev/null 2>&1; then
          TRUST_ENFORCE_REASON=$(cat "$TRUST_RECORDS_FILE" | python3 "${ACTION_PATH}/scripts/check-trust-enforcement.py" 2>&1)
          TRUST_ENFORCE_RC=$?
          if [ $TRUST_ENFORCE_RC -ne 0 ]; then
            echo "::error::${TRUST_ENFORCE_REASON}"
            # Override WORST_EXIT only if trust enforcement triggers
            if [ $WORST_EXIT -eq 0 ]; then
              WORST_EXIT=1
            fi
          fi
        fi

        rm -f "$TRUST_RECORDS_FILE"

        # Write to GitHub step summary
        echo -e "$FULL_SUMMARY" >> "$GITHUB_STEP_SUMMARY"

        # Store summary for PR comment
        EOF_MARKER="ASSAY_SUMMARY_EOF_$(date +%s)"
        echo "summary<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
        echo -e "$FULL_SUMMARY" >> "$GITHUB_OUTPUT"
        echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

        exit $WORST_EXIT

    - name: Comment on PR
      if: always() && github.event_name == 'pull_request' && inputs.comment-on-pr == 'true'
      uses: actions/github-script@v7
      env:
        VERIFY_SUMMARY: ${{ steps.verify.outputs.summary }}
      with:
        script: |
          const summary = process.env.VERIFY_SUMMARY || '';
          if (!summary) return;

          // Stable identity marker — never match on visible heading text.
          // Versioned so future format changes can be migrated cleanly.
          const MARKER = '<!-- assay-verify-action:sticky-comment:v1 -->';

          const body = MARKER + '\n' + summary
            + '\n\n---\n*Posted by [assay-verify-action](https://github.com/Haserjian/assay-verify-action)*';

          // Find existing bot comment by marker + author
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const botLogins = ['github-actions[bot]', 'github-actions'];
          const existing = comments.find(
            c => c.body.includes(MARKER)
              && botLogins.includes(c.user.login)
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Upload Proof Pack artifact
      if: always() && inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: assay-proof-packs
        path: ${{ inputs.pack-path }}
        if-no-files-found: ignore
        overwrite: true

    - name: Artifact exposure notice
      if: always() && inputs.upload-artifact == 'true'
      shell: bash
      run: |
        echo "::notice::Proof Pack artifacts have been uploaded. These are operational outputs for review and debugging. They are NOT receipt-backed trust artifacts unless explicitly designated. Visibility and retention follow GitHub artifact settings, not Assay trust semantics."
