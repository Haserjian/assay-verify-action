name: 'Assay Verify Pack'
description: 'Verify AI evidence bundles (Proof Packs) for integrity and behavioral claims'
author: 'Haserjian'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  pack-path:
    description: 'Path to Proof Pack directory (glob supported)'
    required: false
    default: 'proof_pack_*/'
  require-claim-pass:
    description: 'Fail the step if any claim check is not PASS'
    required: false
    default: 'true'
  lock-file:
    description: 'Path to assay.lock for pinned verification semantics'
    required: false
    default: ''
  comment-on-pr:
    description: 'Post a summary comment on the pull request'
    required: false
    default: 'true'
  upload-artifact:
    description: 'Upload pack as a workflow artifact'
    required: false
    default: 'true'
  require-pack:
    description: 'Fail if PR has file changes but no Proof Pack (set false for docs-only repos)'
    required: false
    default: 'true'
  assay-version:
    description: 'assay-ai version to install (default: latest)'
    required: false
    default: ''
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

outputs:
  integrity:
    description: 'PASS or FAIL'
    value: ${{ steps.verify.outputs.integrity }}
  claims:
    description: 'PASS, FAIL, or N/A'
    value: ${{ steps.verify.outputs.claims }}
  exit-code:
    description: '0 (all pass), 1 (claim fail), 2 (integrity fail)'
    value: ${{ steps.verify.outputs.exit_code }}
  pack-count:
    description: 'Number of packs verified'
    value: ${{ steps.verify.outputs.pack_count }}
  summary:
    description: 'Markdown summary of verification results'
    value: ${{ steps.verify.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Assay
      shell: bash
      env:
        ASSAY_VERSION: ${{ inputs.assay-version }}
      run: |
        if [ -n "$ASSAY_VERSION" ]; then
          pip install "assay-ai==$ASSAY_VERSION" --quiet
        else
          pip install assay-ai --quiet
        fi

    - name: Verify Proof Packs
      id: verify
      shell: bash
      env:
        INPUT_PACK_PATH: ${{ inputs.pack-path }}
        INPUT_REQUIRE_CLAIM_PASS: ${{ inputs.require-claim-pass }}
        INPUT_LOCK_FILE: ${{ inputs.lock-file }}
        INPUT_REQUIRE_PACK: ${{ inputs.require-pack }}
      run: |
        set +e
        PACK_COUNT=0
        WORST_EXIT=0
        SUMMARY=""
        INTEGRITY_ALL="PASS"
        CLAIMS_ALL="PASS"
        HAS_SHADOW_MODE=0

        shopt -s nullglob
        PACK_GLOB="$INPUT_PACK_PATH"
        PACKS=($PACK_GLOB)
        shopt -u nullglob

        if [ ${#PACKS[@]} -eq 0 ]; then
          if [ "$INPUT_REQUIRE_PACK" != "true" ]; then
            echo "::notice::No Proof Packs found (require-pack: false) -- skipping."
            SKIP_SUMMARY="### Assay Verification\n\n**Result: SKIPPED** -- no Proof Packs found (\`require-pack: false\`)\n"
            echo "integrity=N/A" >> "$GITHUB_OUTPUT"
            echo "claims=N/A" >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "pack_count=0" >> "$GITHUB_OUTPUT"
            EOF_MARKER="ASSAY_SUMMARY_EOF_$(date +%s)"
            echo "summary<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo -e "$SKIP_SUMMARY" >> "$GITHUB_OUTPUT"
            echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo -e "$SKIP_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # require-pack is true -- check whether the PR has file changes
          HAS_CHANGES="unknown"
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            # PR context: diff against base branch
            CHANGED_FILES=$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" 2>/dev/null || true)
            if [ -n "$CHANGED_FILES" ]; then
              HAS_CHANGES="yes"
            else
              HAS_CHANGES="no"
            fi
          fi

          if [ "$HAS_CHANGES" = "yes" ]; then
            MSG="PR contains file changes but no Proof Pack covers this commit. Either generate a pack or set \`require-pack: false\`."
          else
            MSG="No Proof Pack directories matched: $INPUT_PACK_PATH"
          fi

          ZERO_SUMMARY="### Assay Verification\n\n**Result: INTEGRITY FAIL** -- $MSG\n"
          echo "::error::$MSG"
          echo "integrity=FAIL" >> "$GITHUB_OUTPUT"
          echo "claims=N/A" >> "$GITHUB_OUTPUT"
          echo "exit_code=2" >> "$GITHUB_OUTPUT"
          echo "pack_count=0" >> "$GITHUB_OUTPUT"
          EOF_MARKER="ASSAY_SUMMARY_EOF_$(date +%s)"
          echo "summary<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo -e "$ZERO_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo -e "$ZERO_SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          exit 2
        fi

        for PACK_DIR in "${PACKS[@]}"; do
          if [ ! -d "$PACK_DIR" ]; then
            continue
          fi

          PACK_COUNT=$((PACK_COUNT + 1))
          PACK_NAME=$(basename "$PACK_DIR")

          # Build verify command
          VERIFY_CMD="assay verify-pack $PACK_DIR"
          if [ "$INPUT_REQUIRE_CLAIM_PASS" = "true" ]; then
            VERIFY_CMD="$VERIFY_CMD --require-claim-pass"
          fi
          if [ -n "$INPUT_LOCK_FILE" ]; then
            VERIFY_CMD="$VERIFY_CMD --lock $INPUT_LOCK_FILE"
          fi

          # Run verification and capture output
          OUTPUT=$($VERIFY_CMD 2>&1)
          EXIT_CODE=$?

          if [ $EXIT_CODE -gt $WORST_EXIT ]; then
            WORST_EXIT=$EXIT_CODE
          fi

          # Parse verify_report.json for structured data
          # Fields from VerifyResult.to_dict(): passed (bool), receipt_count (int),
          # errors, warnings, head_hash. Claims are in claim_verification.passed.
          REPORT="$PACK_DIR/verify_report.json"
          if [ -f "$REPORT" ]; then
            INTEGRITY=$(python3 -c "import json; d=json.load(open('$REPORT')); print('PASS' if d.get('passed', False) else 'FAIL')" 2>/dev/null || echo "UNKNOWN")
            CLAIM_CHECK=$(python3 -c "import json; d=json.load(open('$REPORT')); cv=d.get('claim_verification'); print('N/A' if cv is None else ('PASS' if cv.get('passed', False) else 'FAIL'))" 2>/dev/null || echo "N/A")
            RECEIPT_COUNT=$(python3 -c "import json; d=json.load(open('$REPORT')); print(d.get('receipt_count', '?'))" 2>/dev/null || echo "?")
          else
            INTEGRITY="UNKNOWN"
            CLAIM_CHECK="N/A"
            RECEIPT_COUNT="?"
          fi

          # Parse pack_manifest.json for attestation
          MANIFEST="$PACK_DIR/pack_manifest.json"
          if [ -f "$MANIFEST" ]; then
            PACK_ID=$(python3 -c "import json; d=json.load(open('$MANIFEST')); print(d.get('attestation',{}).get('pack_id','?'))" 2>/dev/null || echo "?")
            MODE=$(python3 -c "import json; d=json.load(open('$MANIFEST')); print(d.get('attestation',{}).get('mode','?'))" 2>/dev/null || echo "?")
          else
            PACK_ID="?"
            MODE="?"
          fi
          MODE_LC=$(echo "$MODE" | tr '[:upper:]' '[:lower:]')
          MODE_LABEL="$MODE"
          if [ "$MODE_LC" = "shadow" ]; then
            HAS_SHADOW_MODE=1
            MODE_LABEL="shadow (not enforced)"
          fi

          if [ "$INTEGRITY" != "PASS" ]; then
            INTEGRITY_ALL="FAIL"
          fi
          if [ "$CLAIM_CHECK" = "FAIL" ]; then
            CLAIMS_ALL="FAIL"
          fi

          # Build per-pack summary row
          if [ "$INTEGRITY" = "PASS" ] && [ "$CLAIM_CHECK" = "PASS" ]; then
            if [ "$MODE_LC" = "shadow" ]; then
              STATUS_ICON="[SHADOW MODE]"
            else
              STATUS_ICON="[PASS]"
            fi
          elif [ "$INTEGRITY" = "PASS" ] && [ "$CLAIM_CHECK" = "FAIL" ]; then
            STATUS_ICON="[CLAIM FAIL]"
          else
            STATUS_ICON="[INTEGRITY FAIL]"
          fi

          SUMMARY="${SUMMARY}| \`${PACK_NAME}\` | ${INTEGRITY} | ${CLAIM_CHECK} | ${RECEIPT_COUNT} | ${MODE_LABEL} |\n"

          echo "::group::$STATUS_ICON $PACK_NAME"
          echo "$OUTPUT"
          echo "::endgroup::"
        done

        echo "integrity=$INTEGRITY_ALL" >> "$GITHUB_OUTPUT"
        echo "claims=$CLAIMS_ALL" >> "$GITHUB_OUTPUT"
        echo "exit_code=$WORST_EXIT" >> "$GITHUB_OUTPUT"
        echo "pack_count=$PACK_COUNT" >> "$GITHUB_OUTPUT"

        # Build full summary markdown
        FULL_SUMMARY="### Assay Verification\n\n"
        if [ $HAS_SHADOW_MODE -eq 1 ]; then
          FULL_SUMMARY="${FULL_SUMMARY}> [!WARNING]\n"
          FULL_SUMMARY="${FULL_SUMMARY}> SHADOW MODE -- not enforced. At least one pack was produced in shadow mode.\n"
          FULL_SUMMARY="${FULL_SUMMARY}> This run logged checks but did not enforce policy gates for shadow-mode packs.\n\n"
        fi
        if [ $WORST_EXIT -eq 0 ]; then
          if [ $HAS_SHADOW_MODE -eq 1 ]; then
            FULL_SUMMARY="${FULL_SUMMARY}**Result: SHADOW MODE -- not enforced**\n\n"
          else
            FULL_SUMMARY="${FULL_SUMMARY}**Result: PASS**\n\n"
          fi
        elif [ $WORST_EXIT -eq 1 ]; then
          FULL_SUMMARY="${FULL_SUMMARY}**Result: CLAIM FAIL** (integrity passed, behavioral claims did not)\n\n"
        else
          FULL_SUMMARY="${FULL_SUMMARY}**Result: INTEGRITY FAIL** (evidence may be tampered or corrupted)\n\n"
        fi

        FULL_SUMMARY="${FULL_SUMMARY}| Pack | Integrity | Claims | Receipts | Mode |\n"
        FULL_SUMMARY="${FULL_SUMMARY}|------|-----------|--------|----------|------|\n"
        FULL_SUMMARY="${FULL_SUMMARY}${SUMMARY}\n"
        FULL_SUMMARY="${FULL_SUMMARY}> Exit code: \`${WORST_EXIT}\` (\`0\` = all pass, \`1\` = claim fail, \`2\` = integrity fail)\n"
        FULL_SUMMARY="${FULL_SUMMARY}>\n"
        FULL_SUMMARY="${FULL_SUMMARY}> Verified by [assay-ai](https://pypi.org/project/assay-ai/) $(assay version 2>/dev/null | head -1 || echo '')\n"

        # Write to GitHub step summary
        echo -e "$FULL_SUMMARY" >> "$GITHUB_STEP_SUMMARY"

        # Store summary for PR comment
        EOF_MARKER="ASSAY_SUMMARY_EOF_$(date +%s)"
        echo "summary<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
        echo -e "$FULL_SUMMARY" >> "$GITHUB_OUTPUT"
        echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

        exit $WORST_EXIT

    - name: Comment on PR
      if: always() && github.event_name == 'pull_request' && inputs.comment-on-pr == 'true'
      uses: actions/github-script@v7
      env:
        VERIFY_SUMMARY: ${{ steps.verify.outputs.summary }}
      with:
        script: |
          const summary = process.env.VERIFY_SUMMARY || '';
          if (!summary) return;

          // Stable identity marker — never match on visible heading text.
          // Versioned so future format changes can be migrated cleanly.
          const MARKER = '<!-- assay-verify-action:sticky-comment:v1 -->';

          const body = MARKER + '\n' + summary
            + '\n\n---\n*Posted by [assay-verify-action](https://github.com/Haserjian/assay-verify-action)*';

          // Find existing bot comment by marker + author
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const botLogins = ['github-actions[bot]', 'github-actions'];
          const existing = comments.find(
            c => c.body.includes(MARKER)
              && botLogins.includes(c.user.login)
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Upload Proof Pack artifact
      if: always() && inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: assay-proof-packs
        path: ${{ inputs.pack-path }}
        if-no-files-found: ignore

    - name: Artifact exposure notice
      if: always() && inputs.upload-artifact == 'true'
      shell: bash
      run: |
        echo "::notice::Proof Pack artifacts have been uploaded. These are operational outputs for review and debugging. They are NOT receipt-backed trust artifacts unless explicitly designated. Visibility and retention follow GitHub artifact settings, not Assay trust semantics."
