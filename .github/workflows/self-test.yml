name: Self Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Assay and create test pack
        run: |
          pip install assay-ai
          # Create a minimal script that emits receipts
          cat > /tmp/test_agent.py << 'PYEOF'
          from assay import emit_receipt
          emit_receipt("model_call", {"model_id": "test", "total_tokens": 42})
          emit_receipt("guardian_verdict", {"verdict": "allow", "action": "self-test"})
          print("Agent run complete")
          PYEOF
          # Run through assay to produce a real pack
          assay run -c receipt_completeness -c guardian_enforcement -- python /tmp/test_agent.py

      - name: Verify with action
        id: verify
        uses: ./
        with:
          pack-path: 'proof_pack_*/'
          require-claim-pass: 'true'
          comment-on-pr: 'false'

      - name: Assert shadow-mode summary labeling
        shell: bash
        env:
          VERIFY_SUMMARY: ${{ steps.verify.outputs.summary }}
        run: |
          if [[ "$VERIFY_SUMMARY" != *"SHADOW MODE -- not enforced"* ]]; then
            echo "::error::Expected shadow warning in summary output"
            echo "$VERIFY_SUMMARY"
            exit 1
          fi
          if [[ "$VERIFY_SUMMARY" == *"**Result: PASS**"* ]]; then
            echo "::error::Shadow mode must not be labeled as PASS"
            echo "$VERIFY_SUMMARY"
            exit 1
          fi
          echo "Shadow summary labeling test passed."

  test-zero-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify with no packs (require-pack true)
        id: verify
        uses: ./
        continue-on-error: true
        with:
          pack-path: 'proof_pack_*/'
          require-pack: 'true'
          comment-on-pr: 'false'

      - name: Assert exit code is 2
        shell: bash
        run: |
          EXIT="${{ steps.verify.outputs.exit-code }}"
          PACK_COUNT="${{ steps.verify.outputs.pack-count }}"
          OUTCOME="${{ steps.verify.outcome }}"
          echo "exit-code=$EXIT  pack-count=$PACK_COUNT  outcome=$OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "::error::Expected step to fail but outcome was: $OUTCOME"
            exit 1
          fi
          if [ "$EXIT" != "2" ]; then
            echo "::error::Expected exit-code=2 but got: $EXIT"
            exit 1
          fi
          if [ "$PACK_COUNT" != "0" ]; then
            echo "::error::Expected pack-count=0 but got: $PACK_COUNT"
            exit 1
          fi
          echo "Zero-pack enforcement test passed."

  test-zero-pack-skip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify with no packs (require-pack false)
        id: verify
        uses: ./
        with:
          pack-path: 'proof_pack_*/'
          require-pack: 'false'
          comment-on-pr: 'false'

      - name: Assert exit code is 0
        shell: bash
        run: |
          EXIT="${{ steps.verify.outputs.exit-code }}"
          OUTCOME="${{ steps.verify.outcome }}"
          echo "exit-code=$EXIT  outcome=$OUTCOME"
          if [ "$OUTCOME" != "success" ]; then
            echo "::error::Expected step to succeed but outcome was: $OUTCOME"
            exit 1
          fi
          if [ "$EXIT" != "0" ]; then
            echo "::error::Expected exit-code=0 but got: $EXIT"
            exit 1
          fi
          echo "Zero-pack skip test passed."
